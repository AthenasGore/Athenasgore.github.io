<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF con Texto</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #000; /* Cambia el color de fondo según tus preferencias */
        }

        .texto-en-centro {
            color: red;
            font-size: 36px; /* Tamaño de la fuente aumentado */
            font-family: "Comic Sans MS", cursive; /* Cambiado a Comic Sans MS */
            text-align: center;
            z-index: 1; /* Asegura que el texto esté sobre el video */
            position: absolute;
        }

        .texto-en-centro a {
            color: red;
            text-decoration: none;
            transition: color 0.3s ease; /* Agregamos una transición para suavizar el cambio de color */
        }

        .texto-en-centro a:hover {
            color: #ff0000; /* Cambiamos el color al pasar el ratón sobre el enlace */
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="texto-en-centro">
        <p><a href="https://twitter.com/AthenasGore" target="_blank">@athenasgore</a></p>
    </div>

    <img src="https://media.tenor.com/Hq7KtCAo7i0AAAAC/lolgel.gif" alt="GIF animado">
</body>
</html>
