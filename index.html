<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css?family=Voltaire');
    
    body {
      text-align: center;
      background-color: black;
      margin: 0;
      padding: 0;
    }

    nav {
      font-family: 'Voltaire', sans-serif;
      color: white;
      display: inline-block;
    }

    nav > a {
      display: block;
      text-decoration: none;
      color: inherit;
      font-size: 1.6em; /* Aumenté el tamaño de la fuente */
      text-transform: uppercase;
      transform-origin: 0 0;
      transform: matrix(1, -0.4, 0, 1.2, 0, 100);
      padding: .4em; /* Aumenté el espaciado interno */
      margin-bottom: .5em; /* Aumenté el margen inferior */
      transition: .5s background;
    }

    .home {
      font-size: 3.5em; /* Aumenté el tamaño de la fuente para el título */
    }

    nav > a:nth-of-type(even) {
      border-right: 8px solid; /* Aumenté el grosor del borde derecho */
      border-top: 1px solid;   
      border-bottom: 1px solid;  
    }

    nav > a:nth-of-type(odd) {
      border-left: 8px solid; /* Aumenté el grosor del borde izquierdo */
    }

    nav > a:hover, nav > a:focus {
      background: rgb(255, 255, 255);
      color: black;
      border-color: rgb(255, 255, 255);
    }
  </style>
</head>
<body>
  <nav role='navigation'>
    <a href="#" class='home'>Athenas gore</a>
    <a href="shacoholic">Shacoholic</a>
    <a href="#">Clients</a>
    <a href="#">Contact Us</a>
    <a href="#">Contact Us</a>
    <a href="#">Contacto</a>
  </nav>
</body>
</html>
