<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css?family=Voltaire');

    *, *:before, *:after {
      margin: 0;
      padding: 0;
      position: relative;
      box-sizing: border-box;
    }

    body {
      text-align: center;
      background-color: black;
    }

    nav {
      font-family: 'Voltaire', sans-serif;
      color: white;
      display: inline-block;
    }

    nav > a {
      display: block;
      text-decoration: none;
      color: inherit;
      font-size: 1.4em;
      text-transform: UPPERCASE;
      transform-origin: 0 0;
      transform: matrix(1, -0.4, 0, 1.2, 0, 100);
      padding: .2em;
      margin-bottom: .3em;
      transition: .5s background;
    }

    .home {
      font-size: 3em;
    }
  </style>
</head>
<body>
  <nav role='navigation'>
    <a href="#" class='home'>Athenas gore</a>
    <a href="#">Spotify</a>
    <a href="#">Redes</a>
    <a href="#">Discord</a>
    <a href="x">Minerva</a>
  </nav>
</body>
</html>
