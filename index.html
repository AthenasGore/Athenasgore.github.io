<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css?family=Voltaire');
    
    body {    /*si borro esto se queda en blanco*/
      text-align: center;
      background-color: black;
    }

    nav {     /*esto son los colores diria*/
      font-family: 'Voltaire', sans-serif;
      color: white;
      display: inline-block;
    }

    nav > a {    /*esto es todo el texto la fuente y eso*/
      display: block;
      text-decoration: none;
      color: inherit;
      font-size: 1.4em;
      text-transform: UPPERCASE;
      transform-origin: 0 0;
      transform: matrix(1, -0.4, 0, 1.2, 0, 100);
      padding: .2em;
      margin-bottom: .3em;
      transition: .5s background;
    }

    .home {    /*esto es el titulo mas tarde */
      font-size: 3em;
    }

    nav > a:nth-of-type(even) {   /*esto es las celdas*/
      border-right: 6px solid; 
      border-top: 1px solid;   
      border-bottom: 1px solid;  
    }

    nav > a:nth-of-type(odd) {  /*esto es de las barritas pequeñas de la derecha*/
      border-left: 6px solid;
    }

    nav > a:hover, nav > a:focus {  /*esto es las animaciones de cuando pasas el raton */
      background: rgb(255, 255, 255);
      color: black;
      border-color: rgb(255, 255, 255);
    }
  </style>
</head>
<body>
  <nav role='navigation'>
    <a href="#" class='home'>Athenas gore</a>
    <a href="shacoholic">Shacoholic</a>
    <a href="#">Clients</a>
    <a href="#">Contact Us</a>
    <a href="#">Contact Us</a>
    <a href="#">Contacto</a>
  </nav>
</body>
</html>
