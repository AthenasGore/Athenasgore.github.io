<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('https://media.tenor.com/Hq7KtCAo7i0AAAAC/lolgel.gif') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white; /* Color del texto */
            font-family: 'Comic Sans MS', cursive, sans-serif; /* Tipo de fuente del texto */
        }

        h1 {
            font-size: 3em; /* Tamaño del texto */
            text-align: center;
            cursor: pointer; /* Cambia el cursor al pasar por encima del texto */
        }

        h1 a {
            color: inherit; /* Hereda el color del texto del contenedor */
            text-decoration: none; /* Quita el subrayado del enlace */
            transition: color 0.3s; /* Agrega una transición para el cambio de color */
        }

        h1 a:hover {
            color: red; /* Cambia el color al pasar el ratón por encima */
        }
    </style>
    <title>Página con Fondo de Imagen</title>
</head>
<body>
    <h1><a href="https://twitter.com/AthenasGore?newtwitter=true" target="_blank">@athenasgore</a></h1>
</body>
</html>
